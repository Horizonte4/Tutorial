<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Django Store{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">Tutorial</a>
      <div>
        <a class="btn btn-outline-light btn-sm" href="/products/">Products</a>
        <a class="btn btn-warning btn-sm" href="/products/create">Create</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1 class="mb-3">{% block header_title %}Online Store{% endblock %}</h1>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
